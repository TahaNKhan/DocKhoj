services:
  qdrant:
    image: qdrant/qdrant
    container_name: dockhoj-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: dockhoj-ollama
    # No ports exposed — app container accesses via docker network at ollama:11434
    volumes:
      - ./ollama_data:/root/.ollama
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dockhoj-app
    image: doc-khoj-app:latest
    ports:
      - "3001:3001"
    volumes:
      - ./documents:/app/documents
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - OLLAMA_BASE_URL=http://ollama:11434
      - EMBEDDING_MODEL=nomic-embed-text
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=documents
      - VECTOR_SIZE=768
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - PORT=3001
      - CHUNK_SIZE=500
      - CHUNK_OVERLAP=50
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped

volumes:
  qdrant_data:
  ollama_data: