services:
  qdrant:
    image: qdrant/qdrant
    container_name: dockhoj-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      # Bind-mount Qdrant's storage into ~/.dockhoj/qdrant/ so the
      # vector index survives `./restart.sh --full`, container
      # rebuilds, and reboots. ${DOCKHOJ_HOME} is exported by
      # restart.sh (default: $HOME/.dockhoj) so users on multi-user
      # hosts can point it elsewhere.
      - ${DOCKHOJ_HOME}/qdrant:/qdrant/storage
    restart: unless-stopped

  ollama:
    # Built from Dockerfile.ollama. The embedding model is baked into the
    # image at build time, so the standard `ollama/ollama:latest` upstream
    # image is replaced with a deterministic DocKhoj-flavored one.
    build:
      context: .
      dockerfile: Dockerfile.ollama
    image: doc-khoj-ollama:latest
    container_name: dockhoj-ollama
    # Note: no `./ollama_data:/root/.ollama` mount. The upstream trick was to
    # persist pulled models across container restarts; with the model baked
    # into the image, that role moves to image versioning. A bind mount here
    # would *shadow* the baked model on first run (empty host dir overlays
    # /root/.ollama inside the container), defeating the whole point. If you
    # ever need to keep additional models beyond the embedded one, add a
    # selective sub-mount instead — not the whole /root/.ollama.
    restart: unless-stopped
    healthcheck:
      # The ollama/ollama image ships only `ollama` and `bash` (no curl/wget),
      # so probe the running server with the CLI itself. `ollama list` exits 0
      # only when it can reach the API on :11434.
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dockhoj-app
    image: doc-khoj-app:latest
    ports:
      - "3001:3001"
    volumes:
      - ./documents:/app/documents
      # Persist SQLite (conversations + messages) into ~/.dockhoj/db/.
      # Without this, the DB lives inside the container's writable
      # layer and is wiped every time the app container is recreated
      # (which `./restart.sh` does on every run). The path matches the
      # app's default SQLITE_PATH (/app/data/conversations.db).
      - ${DOCKHOJ_HOME}/db:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - OLLAMA_BASE_URL=http://ollama:11434
      - EMBEDDING_MODEL=nomic-embed-text
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=documents
      - VECTOR_SIZE=768
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_CONTEXT_SIZE=${LLM_CONTEXT_SIZE:-}
      - PORT=3001
      - CHUNK_MAX_TOKENS=${CHUNK_MAX_TOKENS:-512}
      - CHUNK_OVERLAP_TOKENS=${CHUNK_OVERLAP_TOKENS:-64}
      - CHUNK_MIN_TOKENS=${CHUNK_MIN_TOKENS:-32}
      - CHUNK_SEMANTIC_SPLIT=${CHUNK_SEMANTIC_SPLIT:-true}
      - EMBEDDING_CONCURRENCY=${EMBEDDING_CONCURRENCY:-4}
      - CHAT_HISTORY_MAX_TURNS=${CHAT_HISTORY_MAX_TURNS:-20}
      - LOG_CHUNK_PREVIEW_CHARS=${LOG_CHUNK_PREVIEW_CHARS:-200}
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped